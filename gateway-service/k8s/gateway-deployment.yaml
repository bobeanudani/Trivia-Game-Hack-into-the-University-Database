apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 2
  
  # 🟢 THE ZERO-DOWN-TIME STRATEGY:
  # Enforces that K8s spins up new, working pods BEFORE destroying the old ones,
  # keeping the router pool constantly packed during deployments.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: gateway-service
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        
        # 🟢 THE GATEWAY HEALTH CHECKS:
        # This calls your app's internal Express routing path '/health' every 3 seconds.
        # Traffic will NEVER be routed to a pod unless it responds with an HTTP 200 OK.
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 3
          periodSeconds: 3
          timeoutSeconds: 2
          successThreshold: 1
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 2
          successThreshold: 1
          failureThreshold: 3